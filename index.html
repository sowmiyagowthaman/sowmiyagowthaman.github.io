<!DOCTYPE html>
<html>
<head>
  <title>Sowmiya Portfolio</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f7fa;
    }

    /* NAVBAR */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 60px;
      background: white;
    }

    nav h2 {
      font-size: 20px;
      color: #5C3A21;
    }

    nav a {
      margin: 0 15px;
      text-decoration: none;
      color: black;
      font-weight: bold;
    }

    /* HERO SECTION */
    .hero {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 60px 80px; /* reduced to move content up */
    }

    .hero h1 {
      font-size: 60px;
      margin-bottom: 10px;
    }

    .hero span {
      color: #5C3A21; /* darker brown */
    }

    .hero p {
      font-size: 18px;
      margin-top: 10px;
    }

    /* IMAGE STYLE */
    .hero img {
      width: 320px;
      border-radius: 25px; /* modern rounded rectangle */
      box-shadow: 0 15px 40px rgba(0,0,0,0.25);
    }

  </style>
</head>

<!-- NAVBAR -->
<nav>
  <h2>Welcome to my portfolio</h2>
  <div>

      Analyst – HSBC | MS Business Analytics, UoE ’24 |
