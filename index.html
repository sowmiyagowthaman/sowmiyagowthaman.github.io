<style>
  html {
    scroll-behavior: smooth;
  }

  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f4f2ee;
    color: #1a1a1a;
  }

  /* CONTAINER (keeps everything aligned nicely) */
  .container {
    max-width: 1200px;
    margin: auto;
    padding: 0 40px;
  }

  /* NAVBAR */
  nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 25px 0;
  }

  nav h2 {
    font-size: 20px;
    color: #5a3825;
    font-weight: 600;
    letter-spacing: 1px;
  }

  nav a {
    margin: 0 15px;
    text-decoration: none;
    color: #3d2b1f;
    font-weight: 500;
    transition: 0.3s;
  }

  nav a:hover {
    color: #c49a6c;
  }

  /* HERO SECTION */
  .hero {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 80px 0;
    gap: 40px;
  }

  .hero-text {
    max-width: 550px;
  }

  .hero-text h1 {
    font-size: 48px;
    margin-bottom: 10px;
    color: #2e1f15;
  }

  .hero-text p {
    font-size: 18px;
    line-height: 1.6;
    color: #5a4a42;
  }

  .hero img {
    width: 320px;
    border-radius: 20px;
    object-fit: cover;
  }

  /* SECTION GENERAL */
  section {
    padding: 80px 0;
  }

  h2 {
    text-align: center;
    font-size: 32px;
    margin-bottom: 40px;
    color: #5a3825;
  }

  /* ABOUT */
  .about {
    text-align: center;
    max-width: 800px;
    margin: auto;
    line-height: 1.7;
    color: #4a3a32;
  }

  /* TIMELINE (Education + Experience) */
  .timeline {
    max-width: 800px;
    margin: auto;
  }

  .timeline-item {
    margin-bottom: 40px;
    padding-left: 20px;
    border-left: 2px solid #c49a6c;
  }

  .date {
    color: #c49a6c;
    font-weight: bold;
    font-size: 14px;
  }

  .timeline-item h3 {
    margin: 8px 0;
    color: #2e1f15;
  }

  .timeline-item p {
    margin-top: 8px;
    line-height: 1.6;
    color: #5a4a42;
  }

  /* CONTACT */
  .contact {
    text-align: center;
  }

  .contact p {
    font-size: 16px;
    color: #5a4a42;
  }

  /* BUTTON STYLE (if any) */
  .btn {
    display: inline-block;
    margin-top: 20px;
    padding: 10px 20px;
    border-radius: 25px;
    background: #5a3825;
    color: white;
    text-decoration: none;
    transition: 0.3s;
  }

  .btn:hover {
    background: #c49a6c;
  }

  /* RESPONSIVE FIX */
  @media (max-width: 768px) {
    nav {
      flex-direction: column;
      gap: 10px;
    }

    .hero {
      flex-direction: column;
      text-align: center;
    }

    .hero img {
      width: 250px;
    }
  }
</style>
